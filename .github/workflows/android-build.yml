name: Android Build APK

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8
          cache: gradle
      
      - run: chmod +x ./gradlew
      
      - run: |
          ./gradlew clean
          ./gradlew assembleRelease



      - uses: actions/upload-artifact@v4
        with:
          name: release
          path: |
            **/*.apk
            
